<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fisheye Decode</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b0b13;
  --surface: #11111c;
  --surface2: #181828;
  --border: #2a2a45;
  --text: #c4c4de;
  --muted: #7480a2;
  --accent: #60a5fa;
  --good: #22c55e;
  --warn: #f59e0b;
}
html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
.page {
  max-width: 1080px;
  margin: 0 auto;
  padding: 22px 16px 32px;
  display: grid;
  gap: 14px;
}
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
}
.h1 {
  font-size: 18px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}
.mode-row { display: flex; gap: 8px; flex-wrap: wrap; }
.mode-btn {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface2);
  color: var(--text);
  padding: 8px 12px;
  cursor: pointer;
  font-weight: 600;
}
.mode-btn.active { border-color: var(--accent); color: #dbeafe; }
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 860px) { .grid-2 { grid-template-columns: 1fr; } }
label {
  display: block;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
input[type="text"], textarea, select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 10px;
  font: inherit;
}
textarea { min-height: 90px; resize: vertical; }
.controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.btn {
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  border-radius: 8px;
  padding: 9px 12px;
  cursor: pointer;
  font-weight: 700;
}
.btn.primary { border-color: var(--accent); }
.btn:disabled { opacity: 0.55; cursor: not-allowed; }
.status { font-size: 12px; color: var(--muted); min-height: 18px; }
.status.error { color: #fca5a5; }
.status.ok { color: var(--good); }
.tank {
  position: relative;
  width: 100%;
  height: 300px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background:
    linear-gradient(180deg, rgba(96,165,250,0.08), rgba(7,17,34,0.45)),
    radial-gradient(circle at 25% 22%, rgba(125,211,252,0.15), transparent 45%),
    radial-gradient(circle at 78% 72%, rgba(45,212,191,0.14), transparent 38%),
    var(--surface2);
  overflow: hidden;
}
.tank-guide {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(90deg, transparent 49.5%, rgba(96,165,250,0.18) 50%, transparent 50.5%);
}
.fish-chip {
  position: absolute;
  transform: translate(-50%, -50%);
  border: 1px solid rgba(96,165,250,0.45);
  border-radius: 999px;
  background: rgba(30,41,59,0.9);
  color: #dbeafe;
  padding: 6px 10px;
  font-size: 12px;
  user-select: none;
  cursor: grab;
  white-space: nowrap;
}
.fish-chip.readonly { cursor: default; opacity: 0.9; }
.image-box {
  width: 100%;
  min-height: 280px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface2);
  display: grid;
  place-items: center;
  overflow: hidden;
}
.image-box img { max-width: 100%; max-height: 460px; display: block; }
.choice-list { display: grid; gap: 8px; }
.choice {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface2);
}
.small { font-size: 12px; color: var(--muted); }
.host-config-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.host-config-grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}
@media (max-width: 860px) {
  .host-config-grid,
  .host-config-grid-3 { grid-template-columns: 1fr; }
}
.fish-label-wrap { display: grid; gap: 10px; }
.prompt-box {
  margin-top: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  white-space: pre-wrap;
  font-size: 12px;
  color: #dbeafe;
  max-height: 240px;
  overflow: auto;
}
.hidden { display: none !important; }
pre.result {
  margin-top: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  white-space: pre-wrap;
  font-size: 12px;
  color: #dbeafe;
}
</style>
</head>
<body>
<div class="page">
  <div class="panel">
    <div class="h1">Fisheye Decode</div>
    <div class="small">Player 1 creates a round. Player 2 opens the shared round code in another browser, sees the image, and guesses thought + fish positions.</div>
  </div>

  <div class="panel">
    <div class="mode-row">
      <button class="mode-btn active" id="mode-host-btn" onclick="setMode('host')">Player 1: Host Round</button>
      <button class="mode-btn" id="mode-guess-btn" onclick="setMode('guess')">Player 2: Guess Round</button>
      <a class="btn" href="/index.html">Back</a>
    </div>
  </div>

  <section id="host-panel" class="panel">
    <div class="host-config-grid">
      <div>
        <label>Thought (Correct)</label>
        <textarea id="host-thought" oninput="refreshHostGeneratedPrompt()" placeholder="Enter the deep thought Player 2 should identify"></textarea>
      </div>
      <div>
        <label>Thought (Decoy)</label>
        <textarea id="host-decoy" placeholder="Enter a believable wrong option"></textarea>
      </div>
    </div>

    <div class="host-config-grid-3" style="margin-top:12px;">
      <div>
        <label>Fish Count</label>
        <select id="host-fish-count" onchange="setHostFishCount()">
          <option value="1">1 fish</option>
          <option value="2" selected>2 fish</option>
        </select>
      </div>
      <div>
        <label>Prompt Model</label>
        <select id="host-prompt-model">
          <option value="google/gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
          <option value="anthropic/claude-sonnet-4.6">Claude Sonnet 4.6</option>
          <option value="qwen/qwen3.5-plus-02-15">Qwen 3.5 Plus</option>
          <option value="x-ai/grok-4.1-fast">Grok 4.1 Fast</option>
          <option value="google/gemini-3-flash-preview">Gemini 3 Flash</option>
          <option value="groq:openai/gpt-oss-20b">Groq GPT-OSS 20B</option>
          <option value="groq:llama-3.3-70b-versatile" selected>Groq LLaMA 3.3 70B</option>
        </select>
      </div>
      <div>
        <label>Image Model</label>
        <select id="host-image-model">
          <option value="prunaai/flux-fast|512">flux fast 512</option>
          <option value="prunaai/flux-fast|1024">flux fast 1024</option>
          <option value="google/imagen-3-fast">imagen 3 fast</option>
          <option value="bytedance/seedream-4|1K">seedream 4 1K</option>
          <option value="bytedance/seedream-4|2K" selected>seedream 4 2K</option>
          <option value="bytedance/seedream-4|4K">seedream 4 4K</option>
        </select>
      </div>
    </div>

    <div class="host-config-grid" style="margin-top:12px;">
      <div>
        <label>Sensibility 1 (Optional)</label>
        <input id="host-direction-1" type="text" oninput="refreshHostGeneratedPrompt()" placeholder="e.g. poetic and lyrical">
      </div>
      <div>
        <label>Sensibility 2 (Optional)</label>
        <input id="host-direction-2" type="text" oninput="refreshHostGeneratedPrompt()" placeholder="e.g. clinical and precise">
      </div>
    </div>

    <div class="fish-label-wrap" style="margin-top:12px;">
      <div>
        <label>Fish 1 Concept</label>
        <input id="host-fish-label-1" type="text" value="animal" oninput="syncFishLabelsFromInputs()">
      </div>
      <div id="host-fish-label-2-wrap">
        <label>Fish 2 Concept</label>
        <input id="host-fish-label-2" type="text" value="mineral" oninput="syncFishLabelsFromInputs()">
      </div>
    </div>

    <div class="host-config-grid" style="margin-top:12px;">
      <div>
        <label>Preamble</label>
        <textarea id="host-base-preamble" oninput="refreshHostGeneratedPrompt()">You have several transformation concepts to apply to the thought. Each has two properties:
- Weight (0.00 = ignore, 1.00 = apply strongly)
- Optionally, lean toward a sensibility</textarea>
      </div>
      <div>
        <label>Closing Instruction</label>
        <textarea id="host-base-closing" oninput="refreshHostGeneratedPrompt()">Reimagine the original thought applying these transformations proportionally.
Higher-weighted concepts should have a more visible effect on the output.
Concepts that lean toward a sensibility should pull the style in that direction.
Preserve the core meaning of the original thought.
Only output your new idea, no meta commentary, none of the original prompt.</textarea>
      </div>
    </div>

    <div class="controls" style="margin-top:10px;">
      <label style="margin:0;display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:var(--muted);">
        <input type="checkbox" id="host-keep-brief" checked onchange="refreshHostGeneratedPrompt()">
        Keep LLM output brief
      </label>
    </div>

    <div style="margin-top:12px;">
      <label>PthinkTank (Host Fish Positions)</label>
      <div id="host-tank" class="tank">
        <div class="tank-guide"></div>
      </div>
    </div>

    <div style="margin-top:12px;">
      <label>Generated Prompt (Thought + Fish Weights/Leans)</label>
      <div id="host-generated-prompt" class="prompt-box">—</div>
    </div>

    <div class="controls" style="margin-top:12px;">
      <button class="btn" onclick="randomizeHostFish()">Randomize Fish</button>
      <button class="btn primary" id="create-round-btn" onclick="createRound()">Generate Round Image</button>
    </div>
    <div id="host-status" class="status"></div>
    <pre id="host-result" class="result hidden"></pre>
  </section>

  <section id="guess-panel" class="panel hidden">
    <div class="controls" style="margin-bottom:10px;">
      <input id="guess-code" type="text" placeholder="Round code (e.g. AB12CD)" style="max-width:220px;text-transform:uppercase;" />
      <button class="btn" onclick="loadRound()">Load Round</button>
    </div>
    <div id="guess-status" class="status"></div>

    <div class="grid-2" id="guess-body" class="hidden" style="margin-top:10px;">
      <div>
        <label>Reference Image</label>
        <div class="image-box" id="guess-image-box"><span class="small">Load a round to begin.</span></div>
      </div>
      <div>
        <label>Which Thought Is Correct?</label>
        <div id="guess-options" class="choice-list"></div>
      </div>
    </div>

    <div id="guess-tank-wrap" class="hidden" style="margin-top:12px;">
      <label>Place Fish Where You Think Player 1 Put Them</label>
      <div id="guess-tank" class="tank"><div class="tank-guide"></div></div>
      <div class="controls" style="margin-top:10px;">
        <button class="btn primary" id="submit-guess-btn" onclick="submitGuess()">Submit Guess</button>
      </div>
    </div>

    <pre id="guess-result" class="result hidden"></pre>
  </section>
</div>

<script>
var mode = 'host';
var DEADZONE_HALF = 0.10;
var hostFish = [
  { label: 'animal', x_frac: 0.33, y_frac: 0.36 },
  { label: 'mineral', x_frac: 0.71, y_frac: 0.68 }
];
var guessFish = [];
var activeDrag = null;
var loadedRound = null;

function setMode(next) {
  mode = next === 'guess' ? 'guess' : 'host';
  document.getElementById('mode-host-btn').classList.toggle('active', mode === 'host');
  document.getElementById('mode-guess-btn').classList.toggle('active', mode === 'guess');
  document.getElementById('host-panel').classList.toggle('hidden', mode !== 'host');
  document.getElementById('guess-panel').classList.toggle('hidden', mode !== 'guess');
}

function clamp01(v) {
  var n = Number(v);
  if (!Number.isFinite(n)) return 0.5;
  if (n < 0) return 0;
  if (n > 1) return 1;
  return n;
}

function inDeadzone(xFrac) {
  return Math.abs(clamp01(xFrac) - 0.5) <= DEADZONE_HALF;
}

function leanIntensity(xFrac) {
  var x = clamp01(xFrac);
  var minPct = 0.01;
  if (inDeadzone(x)) return 0;
  if (x < 0.5) {
    var rawLeft = (0.5 - DEADZONE_HALF - x) / (0.5 - DEADZONE_HALF);
    var nLeft = Math.max(0, Math.min(1, rawLeft));
    return minPct + (1 - minPct) * Math.pow(nLeft, 1.8);
  }
  var rawRight = (x - (0.5 + DEADZONE_HALF)) / (0.5 - DEADZONE_HALF);
  var nRight = Math.max(0, Math.min(1, rawRight));
  return minPct + (1 - minPct) * Math.pow(nRight, 1.8);
}

function updateFishLabelInputs() {
  var f1 = document.getElementById('host-fish-label-1');
  var f2 = document.getElementById('host-fish-label-2');
  var wrap2 = document.getElementById('host-fish-label-2-wrap');
  if (f1 && hostFish[0]) f1.value = hostFish[0].label || '';
  if (f2 && hostFish[1]) f2.value = hostFish[1].label || '';
  if (wrap2) wrap2.style.display = hostFish.length > 1 ? '' : 'none';
}

function syncFishLabelsFromInputs() {
  var f1 = (document.getElementById('host-fish-label-1').value || '').trim();
  var f2 = (document.getElementById('host-fish-label-2').value || '').trim();
  if (hostFish[0]) hostFish[0].label = f1 || 'fish 1';
  if (hostFish[1]) hostFish[1].label = f2 || 'fish 2';
  renderTank('host-tank', hostFish, false, 'host');
  refreshHostGeneratedPrompt();
}

function setHostFishCount() {
  var count = Number(document.getElementById('host-fish-count').value || 1);
  if (count <= 1) {
    hostFish = [hostFish[0] || { label: 'animal', x_frac: 0.5, y_frac: 0.5 }];
  } else {
    if (hostFish.length < 1) hostFish.push({ label: 'animal', x_frac: 0.33, y_frac: 0.36 });
    if (hostFish.length < 2) hostFish.push({ label: 'mineral', x_frac: 0.71, y_frac: 0.68 });
    hostFish = hostFish.slice(0, 2);
  }
  updateFishLabelInputs();
  renderTank('host-tank', hostFish, false, 'host');
  refreshHostGeneratedPrompt();
}

function randomizeHostFish() {
  for (var i = 0; i < hostFish.length; i++) {
    hostFish[i].x_frac = 0.15 + Math.random() * 0.7;
    hostFish[i].y_frac = 0.15 + Math.random() * 0.7;
  }
  renderTank('host-tank', hostFish, false, 'host');
  refreshHostGeneratedPrompt();
}

function renderTank(tankId, fishList, readOnly, dragScope) {
  var tank = document.getElementById(tankId);
  if (!tank) return;
  Array.from(tank.querySelectorAll('.fish-chip')).forEach(function(el) { el.remove(); });

  var w = tank.clientWidth || 600;
  var h = tank.clientHeight || 300;

  fishList.forEach(function(fish, index) {
    var chip = document.createElement('div');
    chip.className = 'fish-chip' + (readOnly ? ' readonly' : '');
    chip.textContent = fish.label || ('fish ' + (index + 1));
    chip.style.left = Math.round(clamp01(fish.x_frac) * w) + 'px';
    chip.style.top = Math.round(clamp01(fish.y_frac) * h) + 'px';

    if (!readOnly) {
      chip.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        activeDrag = { scope: dragScope, index: index, tankId: tankId };
        chip.setPointerCapture(e.pointerId);
      });
    }

    tank.appendChild(chip);
  });
}

function updateDragPosition(scope, tankId, index, clientX, clientY) {
  var tank = document.getElementById(tankId);
  if (!tank) return;
  var rect = tank.getBoundingClientRect();
  if (!rect.width || !rect.height) return;

  var x = clamp01((clientX - rect.left) / rect.width);
  var y = clamp01((clientY - rect.top) / rect.height);

  var target = scope === 'host' ? hostFish : guessFish;
  if (!target[index]) return;
  target[index].x_frac = x;
  target[index].y_frac = y;
  renderTank(tankId, target, false, scope);
  if (scope === 'host') refreshHostGeneratedPrompt();
}

document.addEventListener('pointermove', function(e) {
  if (!activeDrag) return;
  updateDragPosition(activeDrag.scope, activeDrag.tankId, activeDrag.index, e.clientX, e.clientY);
});

document.addEventListener('pointerup', function() {
  activeDrag = null;
});

document.addEventListener('pointercancel', function() {
  activeDrag = null;
});

function setHostStatus(text, isError, isOk) {
  var el = document.getElementById('host-status');
  el.textContent = text || '';
  el.classList.toggle('error', !!isError);
  el.classList.toggle('ok', !!isOk);
}

function setGuessStatus(text, isError, isOk) {
  var el = document.getElementById('guess-status');
  el.textContent = text || '';
  el.classList.toggle('error', !!isError);
  el.classList.toggle('ok', !!isOk);
}

function buildHostGeneratedPrompt() {
  var source = (document.getElementById('host-thought').value || '').trim();
  var dir1 = (document.getElementById('host-direction-1').value || '').trim();
  var dir2 = (document.getElementById('host-direction-2').value || '').trim();
  var preamble = (document.getElementById('host-base-preamble').value || '').trim();
  var closing = (document.getElementById('host-base-closing').value || '').trim();
  var keepBrief = !!document.getElementById('host-keep-brief').checked;

  var activeFish = hostFish.filter(function(f) { return (1.0 - clamp01(f.y_frac)) > 0.01; });
  if (!source) return 'Enter a thought to build the generated prompt.';
  if (!activeFish.length) {
    return 'Here is the original thought:\n\n"""\n' + source + '\n"""\n\nNo active transformation concepts (all at zero weight).';
  }

  var lines = activeFish.map(function(f, i) {
    var label = (f.label || ('fish ' + (i + 1))).trim();
    var weight = (1.0 - clamp01(f.y_frac)).toFixed(2);
    var lean = clamp01(f.x_frac);
    var leanDesc = '';
    if (!inDeadzone(lean)) {
      if (lean < 0.5 && dir1) leanDesc = 'leans ' + Math.round(leanIntensity(lean) * 100) + '% toward "' + dir1 + '"';
      else if (lean > 0.5 && dir2) leanDesc = 'leans ' + Math.round(leanIntensity(lean) * 100) + '% toward "' + dir2 + '"';
    }
    return label + ': weight ' + weight + (leanDesc ? ', ' + leanDesc : '');
  }).join('\n');

  var brief = keepBrief ? '\nKeep your answer extremely brief (e.g., less than 20 words).' : '';
  return 'Here is the original thought:\n\n"""\n' + source + '\n"""\n\n' +
    preamble + '\n\n' + lines + '\n\n' + closing + brief;
}

function refreshHostGeneratedPrompt() {
  var el = document.getElementById('host-generated-prompt');
  if (!el) return;
  el.textContent = buildHostGeneratedPrompt();
}

async function createRound() {
  var btn = document.getElementById('create-round-btn');
  var thought = (document.getElementById('host-thought').value || '').trim();
  var decoy = (document.getElementById('host-decoy').value || '').trim();
  var promptModel = (document.getElementById('host-prompt-model').value || '').trim();
  var imageModel = (document.getElementById('host-image-model').value || '').trim();
  var direction1 = (document.getElementById('host-direction-1').value || '').trim();
  var direction2 = (document.getElementById('host-direction-2').value || '').trim();
  var basePreamble = (document.getElementById('host-base-preamble').value || '').trim();
  var baseClosing = (document.getElementById('host-base-closing').value || '').trim();
  var keepBrief = !!document.getElementById('host-keep-brief').checked;
  var resultEl = document.getElementById('host-result');
  resultEl.classList.add('hidden');

  if (!thought || !decoy) {
    setHostStatus('Enter both thought and decoy thought.', true, false);
    return;
  }
  if (thought.toLowerCase() === decoy.toLowerCase()) {
    setHostStatus('Decoy thought must be different from the true thought.', true, false);
    return;
  }

  btn.disabled = true;
  setHostStatus('Building generated prompt -> LLM image prompt -> Replicate image...', false, false);

  try {
    var res = await fetch('/api/fisheye-game/rounds', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        thought: thought,
        decoy_thought: decoy,
        fish: hostFish,
        direction_1: direction1,
        direction_2: direction2,
        keep_brief: keepBrief,
        base_preamble: basePreamble,
        base_closing: baseClosing,
        prompt_model: promptModel,
        image_model: imageModel,
        image_seed: 2110
      })
    });
    var data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.message || 'Round creation failed');

    var absoluteJoin = window.location.origin + data.join_url;
    resultEl.textContent = [
      'Round created.',
      'Code: ' + data.round_code,
      'Join link: ' + absoluteJoin,
      'Image URL: ' + data.image_url,
      '',
      'Generated prompt:',
      data.generated_prompt || '(none)',
      '',
      'LLM image prompt:',
      data.image_prompt || '(none)'
    ].join('\n');
    resultEl.classList.remove('hidden');
    setHostStatus('Round is ready. Share the code/link with Player 2.', false, true);
  } catch (err) {
    setHostStatus(String(err && err.message ? err.message : err), true, false);
  } finally {
    btn.disabled = false;
  }
}

function buildThoughtChoices(options) {
  var wrap = document.getElementById('guess-options');
  wrap.innerHTML = '';
  options.forEach(function(opt, i) {
    var row = document.createElement('label');
    row.className = 'choice';
    row.innerHTML =
      '<input type="radio" name="thought-choice" value="' + i + '" ' + (i === 0 ? 'checked' : '') + '>' +
      '<span>' + opt + '</span>';
    wrap.appendChild(row);
  });
}

function selectedThoughtIndex() {
  var checked = document.querySelector('input[name="thought-choice"]:checked');
  if (!checked) return -1;
  var idx = parseInt(checked.value || '-1', 10);
  return Number.isFinite(idx) ? idx : -1;
}

async function loadRound() {
  var code = (document.getElementById('guess-code').value || '').trim().toUpperCase();
  if (!code) {
    setGuessStatus('Enter a round code.', true, false);
    return;
  }

  setGuessStatus('Loading round...', false, false);
  document.getElementById('guess-result').classList.add('hidden');

  try {
    var res = await fetch('/api/fisheye-game/rounds/' + encodeURIComponent(code));
    var data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.message || 'Failed to load round');

    loadedRound = data;
    buildThoughtChoices(data.thought_options || []);

    var imgBox = document.getElementById('guess-image-box');
    imgBox.innerHTML = '';
    var img = document.createElement('img');
    img.src = data.image_url;
    img.alt = 'Round reference image';
    imgBox.appendChild(img);

    var fishCount = Math.max(1, Math.min(2, Number(data.fish_count) || 1));
    guessFish = [];
    for (var i = 0; i < fishCount; i++) {
      guessFish.push({
        label: 'guess fish ' + (i + 1),
        x_frac: fishCount === 1 ? 0.5 : (i === 0 ? 0.33 : 0.67),
        y_frac: fishCount === 1 ? 0.5 : 0.5
      });
    }

    renderTank('guess-tank', guessFish, false, 'guess');
    document.getElementById('guess-tank-wrap').classList.remove('hidden');
    setGuessStatus('Round loaded. Choose thought and place fish, then submit.', false, true);
  } catch (err) {
    setGuessStatus(String(err && err.message ? err.message : err), true, false);
  }
}

async function submitGuess() {
  if (!loadedRound || !loadedRound.round_code) {
    setGuessStatus('Load a round before submitting.', true, false);
    return;
  }

  var thoughtIndex = selectedThoughtIndex();
  if (thoughtIndex < 0) {
    setGuessStatus('Pick a thought option.', true, false);
    return;
  }

  var btn = document.getElementById('submit-guess-btn');
  btn.disabled = true;
  setGuessStatus('Submitting guess...', false, false);

  try {
    var res = await fetch('/api/fisheye-game/rounds/' + encodeURIComponent(loadedRound.round_code) + '/guess', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ thought_index: thoughtIndex, fish: guessFish })
    });
    var data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.message || 'Guess failed');

    var resultText = [
      'Thought correct: ' + (data.thought_correct ? 'yes' : 'no'),
      'Correct thought: ' + data.correct_thought,
      'Position score: ' + data.position_score + '/100',
      'Average fish distance: ' + Number(data.avg_distance || 0).toFixed(3),
      'Total score: ' + data.total_score + '/100'
    ].join('\n');

    var resultEl = document.getElementById('guess-result');
    resultEl.textContent = resultText;
    resultEl.classList.remove('hidden');
    setGuessStatus('Guess submitted.', false, true);

    if (Array.isArray(data.target_fish) && data.target_fish.length) {
      var targetFish = data.target_fish.map(function(f, i) {
        return {
          label: (f.label || ('target fish ' + (i + 1))) + ' (target)',
          x_frac: clamp01(f.x_frac),
          y_frac: clamp01(f.y_frac)
        };
      });
      renderTank('guess-tank', targetFish, true, 'guess');
    }
  } catch (err) {
    setGuessStatus(String(err && err.message ? err.message : err), true, false);
  } finally {
    btn.disabled = false;
  }
}

function initFromQuery() {
  var params = new URLSearchParams(window.location.search);
  var code = (params.get('round') || '').trim().toUpperCase();
  if (code) {
    setMode('guess');
    document.getElementById('guess-code').value = code;
    loadRound();
  }
}

async function loadHostDefaults() {
  try {
    var cfgRes = await fetch('/api/app-config');
    if (cfgRes.ok) {
      var cfg = await cfgRes.json();
      var model = cfg && cfg.config && cfg.config.default_model;
      if (typeof model === 'string' && model.trim()) {
        var modelEl = document.getElementById('host-prompt-model');
        if (modelEl && Array.from(modelEl.options).some(function(o) { return o.value === model; })) {
          modelEl.value = model;
        }
      }
    }
  } catch (_) {}
  try {
    var promptRes = await fetch('/api/prompt-templates');
    if (promptRes.ok) {
      var data = await promptRes.json();
      if (typeof data.preamble === 'string' && data.preamble.trim()) {
        document.getElementById('host-base-preamble').value = data.preamble;
      }
      if (typeof data.closing === 'string' && data.closing.trim()) {
        document.getElementById('host-base-closing').value = data.closing;
      }
    }
  } catch (_) {}
  refreshHostGeneratedPrompt();
}

renderTank('host-tank', hostFish, false, 'host');
updateFishLabelInputs();
refreshHostGeneratedPrompt();
loadHostDefaults();
initFromQuery();
</script>
</body>
</html>
